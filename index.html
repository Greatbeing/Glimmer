<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>微光 - 每日微光，照亮心房</title>
  <style>
    :root {
      --primary: #FF8C42;
      --primary-light: #FFB074;
      --primary-dark: #E67A35;
      --bg: #FDF6F0;
      --bg-gradient: linear-gradient(180deg, #FDF6F0 0%, #FFF5EB 100%);
      --card: #FFFFFF;
      --card-gradient: linear-gradient(145deg, #FFFFFF 0%, #FFF9F5 100%);
      --text: #2D2926;
      --text-secondary: #5C5550;
      --muted: #9C9590;
      --accent-like: #FF6B7A;
      --accent-catch: #FFB830;
      --accent-comment: #7DD3A8;
      --shadow-soft: 0 8px 32px rgba(255, 140, 66, 0.1);
      --shadow-card: 0 12px 48px rgba(255, 140, 66, 0.12);
      --radius-sm: 12px;
      --radius-md: 20px;
      --radius-lg: 28px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      height: 100%;
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background: var(--bg-gradient);
      position: relative;
    }

    .header {
      padding: 20px 24px 16px;
      background: linear-gradient(180deg, #FFFFFF 0%, #FFF9F5 100%);
      text-align: center;
      position: relative;
      z-index: 10;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      border-radius: 2px;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 4px;
    }

    .slogan {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: 2px;
    }

    .main {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .page {
      position: absolute;
      inset: 0;
      padding: 24px;
      padding-bottom: 90px;
      overflow-y: hidden;
      display: none;
    }

    .page.active { display: block; }

    .quote-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      text-align: center;
      min-height: 380px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s ease-out, opacity 0.15s ease-out;
      touch-action: pan-y;
    }

    .quote-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light), var(--primary));
    }

    .quote-card:active {
      transform: scale(0.98);
    }

    .quote-inner {
      padding: 44px 32px 36px;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .quote-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      background: var(--bg);
      padding: 8px 16px;
      border-radius: 20px;
      margin-bottom: 32px;
      align-self: center;
    }

    .quote-text {
      flex: 1;
      display: flex;
      align-items: center;
      font-size: 22px;
      line-height: 2;
      color: var(--text);
      text-align: center;
      letter-spacing: 1px;
      justify-content: center;
    }

    .quote-source {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(0,0,0,0.04);
      font-size: 14px;
      color: var(--muted);
      font-style: normal;
    }

    .quote-actions {
      display: flex;
      justify-content: center;
      gap: 48px;
      margin-top: 32px;
    }

    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 12px;
      border-radius: var(--radius-md);
      transition: all 0.2s ease;
      color: var(--muted);
    }

    .action-btn .icon {
      font-size: 28px;
      line-height: 1;
      transition: transform 0.2s ease;
    }

    .action-btn .count {
      font-size: 13px;
      font-weight: 500;
    }

    .action-btn:active .icon {
      transform: scale(1.2);
    }

    .action-btn.liked {
      color: var(--accent-like);
    }

    .action-btn.liked .icon {
      animation: heartPulse 0.4s ease;
    }

    @keyframes heartPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.4); }
      100% { transform: scale(1); }
    }

    .action-btn.caught {
      color: var(--accent-catch);
    }

    .action-btn.caught .icon {
      animation: starRotate 0.5s ease;
    }

    @keyframes starRotate {
      0% { transform: scale(1) rotate(0deg); }
      50% { transform: scale(1.3) rotate(180deg); }
      100% { transform: scale(1) rotate(360deg); }
    }

    .swipe-hint {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-top: 28px;
      color: var(--muted);
    }

    .swipe-hint .arrow {
      font-size: 20px;
      animation: bounceUp 1.5s ease-in-out infinite;
    }

    .swipe-hint .text {
      font-size: 13px;
    }

    @keyframes bounceUp {
      0%, 100% { transform: translateY(0); opacity: 0.5; }
      50% { transform: translateY(-6px); opacity: 1; }
    }

    .publish-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
      padding: 20px;
      margin-bottom: 20px;
    }

    .publish-input {
      width: 100%;
      min-height: 110px;
      border: none;
      background: var(--bg);
      border-radius: var(--radius-md);
      padding: 16px;
      font-size: 16px;
      line-height: 1.7;
      resize: none;
      outline: none;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .publish-input:focus {
      box-shadow: 0 0 0 2px var(--primary-light);
    }

    .publish-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
    }

    .mood-tags {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .mood-tag {
      padding: 8px 16px;
      background: var(--bg);
      border: none;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s ease;
    }

    .mood-tag.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      transform: scale(1.05);
    }

    .publish-btn {
      padding: 12px 28px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      border: none;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(255, 140, 66, 0.3);
      transition: all 0.2s ease;
    }

    .publish-btn:active {
      transform: scale(0.95);
      box-shadow: 0 2px 8px rgba(255, 140, 66, 0.3);
    }

    .posts-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .post-card {
      background: var(--card);
      border-radius: var(--radius-md);
      padding: 20px;
      box-shadow: var(--shadow-soft);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .post-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .post-user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .post-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: white;
    }

    .post-user {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .post-time {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .post-mood {
      font-size: 12px;
      color: var(--primary);
      background: rgba(255, 140, 66, 0.1);
      padding: 4px 12px;
      border-radius: 12px;
    }

    .post-content {
      font-size: 15px;
      line-height: 1.8;
      color: var(--text-secondary);
      margin-top: 12px;
    }

    .post-actions {
      display: flex;
      gap: 24px;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid rgba(0,0,0,0.04);
    }

    .post-action {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      font-size: 14px;
      color: var(--muted);
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .post-action:active {
      background: var(--bg);
    }

    .post-action.liked {
      color: var(--accent-like);
    }

    .space-header {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-soft);
    }

    .space-avatar {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: white;
      box-shadow: 0 4px 16px rgba(255, 140, 66, 0.3);
    }

    .space-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .space-desc {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .stats-bar {
      display: flex;
      background: var(--card);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-soft);
    }

    .stat-item {
      flex: 1;
      text-align: center;
      position: relative;
    }

    .stat-item:not(:last-child)::after {
      content: '';
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 1px;
      height: 40px;
      background: rgba(0,0,0,0.06);
    }

    .stat-value {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .tabs {
      display: flex;
      background: var(--card);
      border-radius: var(--radius-md);
      padding: 6px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-soft);
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s ease;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      box-shadow: 0 4px 12px rgba(255, 140, 66, 0.25);
    }

    .tab-content {
      min-height: 200px;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: flex; flex-direction: column; gap: 16px; }

    .caught-card {
      background: var(--card);
      border-radius: var(--radius-md);
      padding: 24px;
      box-shadow: var(--shadow-soft);
      position: relative;
      border-left: 4px solid var(--accent-catch);
    }

    .caught-text {
      font-size: 16px;
      line-height: 1.8;
      color: var(--text);
      margin-bottom: 12px;
    }

    .caught-source {
      font-size: 13px;
      color: var(--muted);
    }

    .caught-remove {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      background: var(--bg);
      border: none;
      border-radius: 50%;
      font-size: 14px;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .caught-remove:active {
      background: #FFE5E5;
      color: var(--accent-like);
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 56px;
      opacity: 0.4;
      margin-bottom: 16px;
    }

    .empty-text {
      font-size: 15px;
    }

    .nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: 80px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      justify-content: space-around;
      padding: 10px 20px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      z-index: 100;
    }

    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px 20px;
      border-radius: var(--radius-md);
      color: var(--muted);
      transition: all 0.2s ease;
      position: relative;
    }

    .nav-btn .icon {
      font-size: 24px;
      line-height: 1;
      transition: transform 0.2s ease;
    }

    .nav-btn .label {
      font-size: 11px;
      font-weight: 500;
    }

    .nav-btn.active {
      color: var(--primary);
    }

    .nav-btn.active .icon {
      transform: scale(1.1);
    }

    .nav-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%) scaleX(0);
      width: 24px;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      border-radius: 2px;
      transition: transform 0.2s ease;
    }

    .nav-btn.active::before {
      transform: translateX(-50%) scaleX(1);
    }

    .toast {
      position: fixed;
      top: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 14px 32px;
      border-radius: 28px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 300;
      box-shadow: 0 8px 24px rgba(255, 140, 66, 0.35);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">微光</div>
      <div class="slogan">每日微光，照亮心房</div>
    </header>

    <main class="main">
      <section class="page active" id="pageRecommend">
        <div class="quote-card" id="quoteCard">
          <div class="quote-inner">
            <div class="quote-tag" id="quoteTag">📖 文学作品</div>
            <div class="quote-text" id="quoteText">加载中...</div>
            <div class="quote-source" id="quoteSource">—— </div>
            <div class="quote-actions">
              <button class="action-btn" id="likeBtn">
                <span class="icon">♥</span>
                <span id="likeCount">0</span>
              </button>
              <button class="action-btn" id="catchBtn">
                <span class="icon">✦</span>
              </button>
            </div>
          </div>
        </div>
        <div class="swipe-hint">
          <span class="arrow">↑</span>
          <span class="text">上滑查看下一条</span>
        </div>
      </section>

      <section class="page" id="pagePublish">
        <div class="publish-card">
          <textarea class="publish-input" id="publishInput" placeholder="分享此刻的想法..." maxlength="500"></textarea>
          <div class="publish-footer">
            <div class="mood-tags">
              <button class="mood-tag active" data-mood="">无</button>
              <button class="mood-tag" data-mood="开心">开心</button>
              <button class="mood-tag" data-mood="感悟">感悟</button>
              <button class="mood-tag" data-mood="思念">思念</button>
            </div>
            <button class="publish-btn" id="publishBtn">发布</button>
          </div>
        </div>
        <div class="posts-list" id="postsList"></div>
        <div class="empty" id="emptyPosts" style="display:none;">暂无发布内容</div>
      </section>

      <section class="page" id="pageSpace">
        <div class="space-header">
          <div class="space-avatar">☀</div>
          <div>
            <div class="space-name">微光用户</div>
            <div class="space-desc">记录生活，捕捉微光</div>
          </div>
        </div>
        <div class="stats-bar">
          <div class="stat-item">
            <div class="stat-value" id="catchTotal">0</div>
            <div class="stat-label">捕捉</div>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <div class="stat-value" id="postTotal">0</div>
            <div class="stat-label">发布</div>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <div class="stat-value" id="likeTotal">0</div>
            <div class="stat-label">获赞</div>
          </div>
        </div>
        <div class="tabs">
          <button class="tab-btn active" data-tab="caught">我的捕捉</button>
          <button class="tab-btn" data-tab="posts">我的发布</button>
        </div>
        <div class="tab-content">
          <div class="tab-panel active" id="caughtList"></div>
          <div class="tab-panel" id="postsList"></div>
        </div>
        <div class="empty" id="emptySpace" style="display:none;">暂无内容</div>
      </section>
    </main>

    <nav class="nav">
      <button class="nav-btn active" data-page="Recommend">
        <span class="icon">☀</span>
        <span class="label">每日推荐</span>
      </button>
      <button class="nav-btn" data-page="Publish">
        <span class="icon">✎</span>
        <span class="label">今日发布</span>
      </button>
      <button class="nav-btn" data-page="Space">
        <span class="icon">☁</span>
        <span class="label">我的空间</span>
      </button>
    </nav>

    <div class="toast" id="toast"></div>
  </div>

  <script>
const quotes = [
  { id: 'q1', content: '生活不是等待风暴过去，而是学会在雨中翩翩起舞。', source: '思考致富', author: '拿破仑·希尔', type: 'book' },
  { id: 'q2', content: '我们终此一生，就是要摆脱他人的期待，找到真正的自己。', source: '无声告白', author: '伍绮诗', type: 'book' },
  { id: 'q3', content: '世界上只有一种真正的英雄主义，那就是认清生活的真相后依然热爱生活。', source: '米开朗琪罗传', author: '罗曼·罗兰', type: 'book' },
  { id: 'q4', content: '当你凝视深渊时，深渊也在凝视着你。', source: '善恶的彼岸', author: '尼采', type: 'book' },
  { id: 'q5', content: '所有的大人都曾经是小孩，虽然，只有少数的人记得。', source: '小王子', author: '圣埃克苏佩里', type: 'book' },
  { id: 'q6', content: '人是为了活着本身而活着，而不是为了活着之外的任何事物而活着。', source: '活着', author: '余华', type: 'book' },
  { id: 'q7', content: '愿你出走半生，归来仍是少年。', source: '愿你出走半生，归来仍是少年', author: '孙衍', type: 'book' },
  { id: 'q8', content: '温柔半两，从容一生。', source: '等一朵花开', author: '林帝浣', type: 'book' },
  { id: 'q9', content: '没有人是一座孤岛，在大海里独踞。', source: '没有人是一座孤岛', author: '约翰·多恩', type: 'book' },
  { id: 'q10', content: '岁月极美，在于它必然的流逝。春花、秋月、夏日、冬雪。', source: '三毛全集', author: '三毛', type: 'book' }
];

const store = {
  key: 'wg_data',
  data: null,
  init() {
    const s = localStorage.getItem(this.key);
    this.data = s ? JSON.parse(s) : {
      caught: [],
      posts: [],
      likes: { quotes: [], posts: [] }
    };
  },
  save() {
    localStorage.setItem(this.key, JSON.stringify(this.data));
  },
  getQuotes() { return this.data.caught; },
  addCaught(q) { if (!this.data.caught.find(x => x.id === q.id)) { this.data.caught.unshift(q); this.save(); } },
  removeCaught(id) { this.data.caught = this.data.caught.filter(x => x.id !== id); this.save(); },
  isCaught(id) { return this.data.caught.some(x => x.id === id); },
  getPosts() { return this.data.posts; },
  addPost(p) { this.data.posts.unshift({ id: 'p' + Date.now(), ...p, time: Date.now(), likes: 0 }); this.save(); },
  delPost(id) { this.data.posts = this.data.posts.filter(x => x.id !== id); this.save(); },
  isLikedQuote(id) { return this.data.likes.quotes.includes(id); },
  isLikedPost(id) { return this.data.likes.posts.includes(id); },
  toggleLikeQuote(id) {
    const i = this.data.likes.quotes.indexOf(id);
    if (i === -1) this.data.likes.quotes.push(id);
    else this.data.likes.quotes.splice(i, 1);
    this.save();
    return i === -1;
  },
  toggleLikePost(id) {
    const i = this.data.likes.posts.indexOf(id);
    const post = this.data.posts.find(x => x.id === id);
    if (post) post.likes += (i === -1 ? 1 : -1);
    if (i === -1) this.data.likes.posts.push(id);
    else this.data.likes.posts.splice(i, 1);
    this.save();
    return i === -1;
  }
};

let currentIndex = 0;
let currentQuote = null;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function renderQuote() {
  const q = currentQuote;
  document.getElementById('quoteText').textContent = q.content;
  document.getElementById('quoteSource').textContent = '—— ' + q.source + (q.author ? ' / ' + q.author : '');
  document.getElementById('quoteTag').textContent = q.type === 'ai' ? '✨ AI生成' : '📖 文学作品';

  const likeBtn = document.getElementById('likeBtn');
  const catchBtn = document.getElementById('catchBtn');

  likeBtn.classList.toggle('liked', store.isLikedQuote(q.id));
  catchBtn.classList.toggle('caught', store.isCaught(q.id));

  document.getElementById('likeCount').textContent = Math.floor(Math.random() * 300) + 50;
}

function showQuote(direction) {
  currentQuote = quotes[currentIndex];
  renderQuote();
}

function nextQuote() {
  currentIndex = (currentIndex + 1) % quotes.length;
  showQuote('next');
}

function prevQuote() {
  currentIndex = (currentIndex - 1 + quotes.length) % quotes.length;
  showQuote('prev');
}

function switchPage(name) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.page === name));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === 'page' + name));
  if (name === 'Space') refreshSpace();
  if (name === 'Publish') refreshPosts();
}

function refreshSpace() {
  const caught = store.getQuotes();
  const posts = store.getPosts();
  const totalLikes = posts.reduce((s, p) => s + (p.likes || 0), 0);

  document.getElementById('catchTotal').textContent = caught.length;
  document.getElementById('postTotal').textContent = posts.length;
  document.getElementById('likeTotal').textContent = totalLikes;

  const caughtEl = document.getElementById('caughtList');
  const postsEl = document.getElementById('postsList');
  const emptyEl = document.getElementById('emptySpace');

  if (!caught.length && !posts.length) {
    caughtEl.innerHTML = '';
    postsEl.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  caughtEl.innerHTML = caught.map(q => `
    <div class="caught-card">
      <div class="caught-text">${q.content}</div>
      <div class="caught-source">—— ${q.source}</div>
      <button class="caught-remove" onclick="removeCaught('${q.id}')">✕</button>
    </div>
  `).join('');

  postsEl.innerHTML = posts.map(p => `
    <div class="post-card">
      <div class="post-header">
        <span class="post-user">微光用户</span>
        <span class="post-time">${formatTime(p.time)}</span>
      </div>
      ${p.mood ? '<div class="post-mood">' + p.mood + '</div>' : ''}
      <div class="post-content">${p.content}</div>
      <div class="post-actions">
        <button class="post-action ${store.isLikedPost(p.id) ? 'liked' : ''}" onclick="togglePostLike('${p.id}')">♥ ${p.likes}</button>
        <button class="post-action" onclick="delPost('${p.id}')">删除</button>
      </div>
    </div>
  `).join('');
}

function refreshPosts() {
  const posts = store.getPosts();
  const listEl = document.getElementById('postsList');
  const emptyEl = document.getElementById('emptyPosts');

  if (!posts.length) {
    listEl.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  listEl.innerHTML = posts.map(p => `
    <div class="post-card">
      <div class="post-header">
        <span class="post-user">微光用户</span>
        <span class="post-time">${formatTime(p.time)}</span>
      </div>
      ${p.mood ? '<div class="post-mood">' + p.mood + '</div>' : ''}
      <div class="post-content">${p.content}</div>
      <div class="post-actions">
        <button class="post-action ${store.isLikedPost(p.id) ? 'liked' : ''}" onclick="togglePostLike('${p.id}')">♥ ${p.likes}</button>
      </div>
    </div>
  `).join('');
}

function formatTime(ts) {
  const d = Date.now() - ts;
  if (d < 60000) return '刚刚';
  if (d < 3600000) return Math.floor(d / 60000) + '分钟前';
  if (d < 86400000) return Math.floor(d / 3600000) + '小时前';
  return Math.floor(d / 86400000) + '天前';
}

function removeCaught(id) {
  if (confirm('确定取消捕捉？')) {
    store.removeCaught(id);
    refreshSpace();
    showToast('已取消');
  }
}

function delPost(id) {
  if (confirm('确定删除？')) {
    store.delPost(id);
    refreshSpace();
    showToast('已删除');
  }
}

function togglePostLike(id) {
  store.toggleLikePost(id);
  refreshSpace();
  refreshPosts();
}

// Init
store.init();
showQuote();

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => switchPage(btn.dataset.page));
});

document.getElementById('likeBtn').addEventListener('click', () => {
  if (!currentQuote) return;
  store.toggleLikeQuote(currentQuote.id);
  document.getElementById('likeBtn').classList.toggle('liked', store.isLikedQuote(currentQuote.id));
});

document.getElementById('catchBtn').addEventListener('click', () => {
  if (!currentQuote) return;
  if (store.isCaught(currentQuote.id)) {
    showToast('已捕捉过');
    return;
  }
  store.addCaught(currentQuote);
  document.getElementById('catchBtn').classList.add('caught');
  showToast('捕捉成功！');
});

document.getElementById('publishBtn').addEventListener('click', () => {
  const input = document.getElementById('publishInput');
  const content = input.value.trim();
  if (!content) { showToast('请输入内容'); return; }
  const mood = document.querySelector('.mood-tag.active').dataset.mood;
  store.addPost({ content, mood });
  input.value = '';
  refreshPosts();
  showToast('发布成功！');
});

document.querySelectorAll('.mood-tag').forEach(tag => {
  tag.addEventListener('click', () => {
    document.querySelectorAll('.mood-tag').forEach(t => t.classList.remove('active'));
    tag.classList.add('active');
  });
});

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === btn.dataset.tab + 'List'));
  });
});

// Swipe
const card = document.getElementById('quoteCard');
let startY = 0;
let isMoving = false;

card.addEventListener('touchstart', e => {
  if (e.target.closest('button')) return;
  startY = e.touches[0].clientY;
  isMoving = true;
}, { passive: true });

card.addEventListener('touchmove', e => {
  if (!isMoving || !startY) return;
  const diff = e.touches[0].clientY - startY;
  const move = Math.max(-40, Math.min(40, diff));
  card.style.transform = `translateY(${move}px)`;
  card.style.opacity = 1 - Math.abs(move) / 100;
}, { passive: true });

card.addEventListener('touchend', e => {
  if (!startY) return;
  const diff = startY - e.changedTouches[0].clientY;
  card.style.transform = '';
  card.style.opacity = '';
  isMoving = false;

  if (Math.abs(diff) > 40) {
    if (diff > 0) nextQuote();
    else prevQuote();
  }
  startY = 0;
}, { passive: true });
  </script>
