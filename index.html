<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="每日金句语录 - 每日微光，照亮心房">
  <link rel="manifest" href="manifest.json">
  <title>Glimmer - 每日微光，照亮心房</title>
  <style>
    :root {
      --amber-50: #fffbf7; --amber-100: #fef3c7; --amber-200: #fde68a;
      --amber-300: #fcd34d; --amber-400: #fbbf24; --amber-500: #f59e0b;
      --amber-600: #d97706; --bg-start: #0f172a; --bg-mid: #1e1b4b;
      --bg-end: #312e81; --text-primary: #f3f4f6; --text-secondary: #d1d5db;
      --text-muted: #9ca3af; --glass-bg: rgba(255,255,255,0.06);
      --glass-border: rgba(255,255,255,0.12); --card-radius: 20px;
      --font-sans: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      --font-serif: ui-serif, Georgia, 'Times New Roman', serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font-sans); color: var(--text-primary);
      background: linear-gradient(135deg, var(--bg-start), var(--bg-mid), var(--bg-end));
    }
    .app {
      height: 100%; max-width: 720px; margin: 0 auto;
      display: flex; flex-direction: column; position: relative;
      overflow: hidden;
    }
    @media (max-width: 768px) { .app { max-width: 100%; } }
    .app::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 30% 20%, rgba(251,191,36,0.08), transparent 50%),
                  radial-gradient(circle at 70% 80%, rgba(124,58,237,0.06), transparent 50%);
      pointer-events: none;
    }
    .particles {
      position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 0;
    }
    .particle {
      position: absolute; width: 4px; height: 4px; border-radius: 50%;
      background: rgba(251,191,36,0.3); animation: float linear infinite;
    }
    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
    }
    .glass {
      background: var(--glass-bg); backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .header {
      padding: 20px 24px 12px; display: flex; justify-content: space-between;
      align-items: center; position: relative; z-index: 10;
    }
    .header h1 {
      font-size: 26px; font-weight: 700; color: var(--amber-100);
      letter-spacing: 2px; text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .header p { font-size: 11px; color: var(--amber-200); opacity: 0.7; letter-spacing: 3px; }
    .header-actions { display: flex; gap: 12px; align-items: center; }
    .header-btn {
      width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15); display: flex; align-items: center;
      justify-content: center; cursor: pointer; transition: all 0.2s; color: var(--text-secondary);
    }
    .header-btn:hover { background: rgba(251,191,36,0.15); color: var(--amber-300); }
    .main {
      flex: 1; position: relative; overflow: hidden; padding: 12px; padding-bottom: 80px;
    }
    .page {
      position: absolute; inset: 12px; bottom: 80px; overflow-y: auto;
      display: none; opacity: 0; transform: translateY(20px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      scrollbar-width: none; padding-bottom: 20px;
    }
    .page::-webkit-scrollbar { display: none; }
    .page.active { display: flex; flex-direction: column; opacity: 1; transform: translateY(0); }
    .quote-card {
      border-radius: var(--card-radius); overflow: hidden; position: relative;
      touch-action: pan-y; user-select: none; width: 100%;
    }
    .quote-card-inner {
      padding: 32px 28px; position: relative; z-index: 1;
    }
    .quote-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(251,191,36,0.12); padding: 6px 14px; border-radius: 999px;
      border: 1px solid rgba(251,191,36,0.25); margin-bottom: 20px;
    }
    .quote-badge svg { width: 14px; height: 14px; fill: var(--amber-300); }
    .quote-badge span { font-size: 12px; color: var(--amber-200); font-weight: 500; }
    .quote-zh {
      font-family: var(--font-serif); font-size: clamp(20px, 4vw, 26px);
      line-height: 1.7; color: var(--amber-50); margin-bottom: 16px;
    }
    .quote-en {
      font-family: var(--font-serif); font-size: clamp(14px, 3vw, 16px);
      font-style: italic; color: var(--text-muted); border-left: 3px solid rgba(245,158,11,0.3);
      padding-left: 14px; margin-bottom: 20px; line-height: 1.6;
    }
    .quote-source { font-size: 14px; color: var(--amber-300); font-weight: 600; }
    .quote-tag {
      display: inline-block; padding: 4px 10px; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(245,158,11,0.2); border-radius: 6px; font-size: 12px;
      color: var(--amber-200); margin-top: 14px;
    }
    .quote-actions {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 28px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.1);
    }
    .actions-left { display: flex; gap: 20px; }
    .action-btn {
      display: flex; align-items: center; gap: 6px; color: var(--text-muted);
      cursor: pointer; transition: all 0.2s; padding: 8px 12px; border-radius: 8px;
      position: relative; overflow: hidden;
    }
    .action-btn:hover { background: rgba(255,255,255,0.08); }
    .action-btn:active { transform: scale(0.95); }
    .action-btn.liked { color: #f87171; animation: heartBeat 0.4s ease; }
    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    .action-btn svg { width: 20px; height: 20px; fill: currentColor; }
    .action-btn span { font-size: 13px; }
    .capture-btn {
      display: flex; align-items: center; gap: 8px; background: rgba(245,158,11,0.15);
      border: 1px solid rgba(245,158,11,0.3); padding: 8px 16px; border-radius: 999px;
      color: var(--amber-300); font-size: 13px; cursor: pointer; transition: all 0.2s;
    }
    .capture-btn:hover { background: rgba(245,158,11,0.25); transform: scale(1.05); }
    .capture-btn:active { transform: scale(0.95); }
    .capture-btn.caught { background: rgba(251,191,36,0.3); color: var(--amber-100); }
    .dots-indicator {
      display: flex; justify-content: center; gap: 8px; margin-top: 20px;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.2);
      transition: all 0.3s;
    }
    .dot.active { width: 20px; border-radius: 3px; background: var(--amber-400); }
    .nav {
      position: absolute; bottom: 0; width: 100%; border-top: 1px solid rgba(255,255,255,0.1);
      z-index: 20; padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .nav-inner { display: flex; justify-content: space-around; height: 64px; }
    .nav-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      flex: 1; background: none; border: none; cursor: pointer; color: var(--text-muted);
      transition: all 0.3s; position: relative;
    }
    .nav-btn.active { color: var(--amber-300); }
    .nav-btn.active::after {
      content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 20px; height: 2px; background: var(--amber-400); border-radius: 1px;
    }
    .nav-btn:hover { color: var(--amber-200); }
    .nav-btn svg { width: 22px; height: 22px; fill: currentColor; margin-bottom: 4px; transition: transform 0.2s; }
    .nav-btn:active svg { transform: scale(0.9); }
    .nav-btn span { font-size: 11px; }
    #toast-container {
      position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
      width: 75%; pointer-events: none; z-index: 50;
    }
    .toast {
      background: rgba(0,0,0,0.85); color: var(--amber-100); padding: 10px 20px;
      border-radius: 20px; font-size: 13px; text-align: center; backdrop-filter: blur(8px);
      animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-16px); } }
    @keyframes toastOut { to { opacity: 0; transform: translateY(-16px); } }
    .publish-area { width: 100%; }
    .publish-textarea {
      width: 100%; min-height: 140px; background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 16px;
      font-size: 15px; color: var(--text-primary); resize: none; outline: none;
    }
    .publish-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
    .mood-tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .mood-tag {
      padding: 6px 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px; font-size: 12px; color: var(--text-secondary); cursor: pointer; transition: all 0.2s;
    }
    .mood-tag.active, .mood-tag:hover { background: var(--amber-500); color: #fff; border-color: var(--amber-500); }
    .publish-btn {
      padding: 10px 24px; background: var(--amber-500); color: #fff; border: none;
      border-radius: 999px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .publish-btn:hover { background: var(--amber-600); }
    .space-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
    .space-avatar {
      width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, var(--amber-500), var(--amber-600));
      display: flex; align-items: center; justify-content: center; font-size: 24px;
    }
    .space-name { font-size: 20px; font-weight: 600; color: var(--amber-100); }
    .space-desc { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .stats-bar { display: flex; justify-content: space-around; margin-bottom: 20px; }
    .stat-item { text-align: center; }
    .stat-value { font-size: 24px; font-weight: 700; color: var(--amber-400); }
    .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .empty { text-align: center; padding: 48px 20px; color: var(--text-muted); }
    .empty svg { width: 48px; height: 48px; fill: currentColor; opacity: 0.4; margin-bottom: 12px; }
    
    /* Keyboard hint */
    .keyboard-hint {
      position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
      font-size: 11px; color: var(--text-muted); opacity: 0.5;
      display: none;
    }
    @media (hover: hover) and (pointer: fine) {
      .keyboard-hint { display: block; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="particles" id="particles"></div>
    <header class="header">
      <div>
        <h1>Glimmer</h1>
        <p>每日微光，照亮心房</p>
      </div>
      <div class="header-actions">
        <div class="header-btn" id="musicBtn" title="背景音乐">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        </div>
        <div class="header-btn" id="settingsBtn" title="设置">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="page active" id="pageRecommend">
        <div class="quote-card glass" id="quoteCard">
          <div class="quote-card-inner">
            <div class="quote-badge">
              <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
              <span id="badgeText">晨曦之光</span>
            </div>
            <div class="quote-zh" id="quoteZh"></div>
            <div class="quote-en" id="quoteEn"></div>
            <div class="quote-source" id="quoteSource"></div>
            <div class="quote-tag" id="quoteTag"></div>
            <div class="quote-actions">
              <div class="actions-left">
                <div class="action-btn" id="likeBtn">
                  <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                  <span id="likeCount">0</span>
                </div>
                <div class="action-btn" id="commentBtn">
                  <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                  <span id="commentCount">0</span>
                </div>
              </div>
              <div class="capture-btn" id="catchBtn">捕捉微光</div>
            </div>
          </div>
        </div>
        <div class="dots-indicator" id="dotsIndicator"></div>
        <div class="keyboard-hint">使用 ↑↓ 或 ←→ 键翻页</div>
      </section>

      <section class="page" id="pagePublish">
        <div class="publish-area glass" style="padding: 20px; border-radius: var(--card-radius);">
          <textarea class="publish-textarea" id="publishInput" placeholder="分享此刻的想法..." maxlength="500"></textarea>
          <div class="publish-footer">
            <div class="mood-tags">
              <button class="mood-tag active" data-mood="">无</button>
              <button class="mood-tag" data-mood="开心">开心</button>
              <button class="mood-tag" data-mood="感悟">感悟</button>
              <button class="mood-tag" data-mood="思念">思念</button>
              <button class="mood-tag" data-mood="宁静">宁静</button>
            </div>
            <button class="publish-btn" id="publishBtn">发布</button>
          </div>
        </div>
        <div id="publishPostsList" style="margin-top: 16px;"></div>
        <div class="empty" id="emptyPosts" style="display:none;">
          <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1.003 1.003 0 0 0 0-1.42l-2.34-2.34a1.003 1.003 0 0 0-1.42 0l-1.83 1.83 3.75 3.75 1.84-1.82z"/></svg>
          <div>暂无发布内容</div>
        </div>
      </section>

      <section class="page" id="pageSpace">
        <div class="space-header">
          <div class="space-avatar">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="white"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          </div>
          <div>
            <div class="space-name">微光用户</div>
            <div class="space-desc">记录生活，捕捉微光</div>
          </div>
        </div>
        <div class="stats-bar glass" style="padding: 16px; border-radius: var(--card-radius);">
          <div class="stat-item"><div class="stat-value" id="catchTotal">0</div><div class="stat-label">捕捉</div></div>
          <div class="stat-item"><div class="stat-value" id="postTotal">0</div><div class="stat-label">发布</div></div>
          <div class="stat-item"><div class="stat-value" id="likeTotal">0</div><div class="stat-label">获赞</div></div>
        </div>
        <div class="tabs glass" style="display: flex; padding: 4px; border-radius: 12px; margin-bottom: 16px;">
          <button class="tab-btn active" data-tab="caught" style="flex:1; padding: 8px; background: none; border: none; border-radius: 8px; font-size: 13px; color: var(--text-muted); cursor: pointer;">我的捕捉</button>
          <button class="tab-btn" data-tab="posts" style="flex:1; padding: 8px; background: none; border: none; border-radius: 8px; font-size: 13px; color: var(--text-muted); cursor: pointer;">我的发布</button>
        </div>
        <div class="tab-content">
          <div class="tab-panel active" id="caughtList"></div>
          <div class="tab-panel" id="spacePostsList" style="display:none;"></div>
        </div>
        <div class="empty" id="emptySpace" style="display:none;">
          <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
          <div>暂无内容</div>
        </div>
      </section>
    </main>

    <nav class="nav glass">
      <div class="nav-inner">
        <button class="nav-btn active" data-page="Recommend">
          <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
          <span>每日推荐</span>
        </button>
        <button class="nav-btn" data-page="Publish">
          <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1.003 1.003 0 0 0 0-1.42l-2.34-2.34a1.003 1.003 0 0 0-1.42 0l-1.83 1.83 3.75 3.75 1.84-1.82z"/></svg>
          <span>今日发布</span>
        </button>
        <button class="nav-btn" data-page="Space">
          <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          <span>个人空间</span>
        </button>
      </div>
    </nav>

    <div id="toast-container"></div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
