<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>微光 - 每日微光，照亮心房</title>
  <style>
    /* ====== Design Tokens ====== */
    :root {
      --amber-50: #fffbf7;
      --amber-100: #fef3c7;
      --amber-200: #fde68a;
      --amber-300: #fcd34d;
      --amber-400: #fbbf24;
      --amber-500: #f59e0b;
      --amber-600: #d97706;
      --bg-start: #0f172a;
      --bg-mid: #1e1b4b;
      --bg-end: #312e81;
      --text-primary: #f3f4f6;
      --text-secondary: #d1d5db;
      --text-muted: #9ca3af;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: rgba(0, 0, 0, 0.1) 0px 4px 30px;
      --card-radius: 16px;
      --font-sans: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      --font-serif: ui-serif, Georgia, Cambria, 'Times New Roman', serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: var(--font-sans);
      color: var(--text-primary);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ====== Background ====== */
    .app {
      height: 100%;
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-mid) 50%, var(--bg-end) 100%);
    }

    .app::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 60%);
      animation: glimmer-rotate 20s linear infinite;
      pointer-events: none;
    }

    @keyframes glimmer-rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* ====== Glass Card ====== */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
    }

    /* ====== Header ====== */
    .header {
      padding: 24px 24px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 10;
      background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, transparent 100%);
    }

    .header-title h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--amber-100);
      letter-spacing: 2px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .header-title p {
      font-size: 11px;
      color: var(--amber-200);
      opacity: 0.7;
      letter-spacing: 3px;
      margin-top: 4px;
    }

    .header-bulb {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(251, 191, 36, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s ease-in-out infinite;
    }

    .header-bulb svg {
      width: 16px;
      height: 16px;
      fill: var(--amber-300);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.05); }
    }

    /* ====== Main Content ====== */
    .main {
      flex: 1;
      overflow-y: auto;
      position: relative;
      padding: 16px;
      padding-bottom: 96px;
      scrollbar-width: none;
    }

    .main::-webkit-scrollbar { display: none; }

    .page {
      position: absolute;
      inset: 0;
      padding: 16px;
      padding-bottom: 96px;
      overflow-y: auto;
      display: none;
      scrollbar-width: none;
    }

    .page::-webkit-scrollbar { display: none; }
    .page.active { display: flex; flex-direction: column; }

    /* ====== Quote Card ====== */
    .quote-card {
      border-radius: var(--card-radius);
      overflow: hidden;
      position: relative;
      transition: transform 0.3s ease, opacity 0.3s ease;
      touch-action: pan-y;
      user-select: none;
    }

    .quote-card::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 128px;
      height: 128px;
      background: rgba(245, 158, 11, 0.2);
      border-radius: 50%;
      filter: blur(64px);
      pointer-events: none;
    }

    .quote-inner {
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .quote-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 0, 0, 0.2);
      padding: 4px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 16px;
    }

    .quote-badge svg {
      width: 14px;
      height: 14px;
      fill: var(--amber-300);
      animation: pulse 2s ease-in-out infinite;
    }

    .quote-badge span {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .quote-wave {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 12px;
      margin-left: 4px;
    }

    .quote-wave span {
      width: 2px;
      background: rgba(255,255,255,0.5);
      border-radius: 1px;
      animation: wave-bounce 1s ease-in-out infinite;
    }

    .quote-wave span:nth-child(1) { height: 8px; animation-delay: 0s; }
    .quote-wave span:nth-child(2) { height: 12px; animation-delay: 0.2s; }
    .quote-wave span:nth-child(3) { height: 4px; animation-delay: 0.4s; }

    @keyframes wave-bounce {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.5); }
    }

    .quote-content {
      min-height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .quote-zh {
      font-family: var(--font-serif);
      font-size: 20px;
      line-height: 1.8;
      color: var(--amber-50);
      font-weight: 500;
      margin-bottom: 16px;
    }

    .quote-en {
      font-family: var(--font-serif);
      font-size: 14px;
      font-style: italic;
      color: var(--text-muted);
      border-left: 2px solid rgba(245, 158, 11, 0.3);
      padding-left: 12px;
      margin-bottom: 16px;
    }

    .quote-source {
      font-size: 14px;
      color: var(--amber-200);
      opacity: 0.8;
      font-weight: 600;
    }

    .quote-context {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-top: 8px;
    }

    .quote-tag {
      display: inline-block;
      padding: 2px 8px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 4px;
      font-size: 12px;
      color: var(--amber-200);
      margin-top: 12px;
    }

    /* Quote Actions */
    .quote-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .quote-actions-left {
      display: flex;
      gap: 16px;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      transition: color 0.2s ease;
      padding: 4px;
    }

    .action-btn:hover { color: var(--amber-300); }
    .action-btn svg { width: 20px; height: 20px; fill: currentColor; }
    .action-btn span { font-size: 13px; }

    .action-btn.liked { color: #f87171; }
    .action-btn.liked svg { animation: heartBeat 0.4s ease; }

    .action-btn.caught { color: var(--amber-300); }

    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.25); }
    }

    .capture-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(245, 158, 11, 0.2);
      border: 1px solid rgba(245, 158, 11, 0.3);
      padding: 6px 12px;
      border-radius: 999px;
      color: var(--amber-300);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .capture-btn:hover { background: rgba(245, 158, 11, 0.3); }
    .capture-btn svg { width: 16px; height: 16px; fill: currentColor; }

    /* Comment Area */
    .comment-area {
      margin-top: 16px;
      display: none;
    }

    .comment-area.show { display: block; animation: fadeIn 0.3s ease; }

    .comment-input-wrap {
      display: flex;
      gap: 8px;
    }

    .comment-input {
      flex: 1;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s ease;
    }

    .comment-input:focus { border-color: rgba(245, 158, 11, 0.5); }

    .comment-send {
      background: var(--amber-500);
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .comment-send:hover { background: var(--amber-600); }

    /* Pagination Dots */
    .quote-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 24px;
    }

    .quote-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transition: all 0.3s ease;
    }

    .quote-dots span.active {
      background: var(--amber-400);
      width: 24px;
      border-radius: 4px;
    }

    /* ====== Publish Page ====== */
    .publish-card {
      border-radius: var(--card-radius);
      padding: 16px;
      margin-bottom: 16px;
    }

    .publish-textarea {
      width: 100%;
      min-height: 120px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      line-height: 1.7;
      resize: none;
      outline: none;
      font-family: inherit;
      color: var(--text-primary);
      transition: border-color 0.2s ease;
    }

    .publish-textarea::placeholder { color: var(--text-muted); opacity: 0.6; }
    .publish-textarea:focus { border-color: rgba(245, 158, 11, 0.5); }

    .publish-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
    }

    .mood-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mood-tag {
      padding: 6px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      font-size: 12px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s ease;
    }

    .mood-tag.active {
      background: var(--amber-500);
      border-color: var(--amber-500);
      color: white;
    }

    .publish-btn {
      padding: 8px 20px;
      background: var(--amber-500);
      color: white;
      border: none;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .publish-btn:active { transform: scale(0.95); }
    .publish-btn:hover { background: var(--amber-600); }

    /* Post Cards */
    .posts-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .post-card {
      border-radius: var(--card-radius);
      padding: 16px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .post-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .post-user { font-size: 14px; font-weight: 600; color: var(--amber-100); }
    .post-time { font-size: 12px; color: var(--text-muted); }

    .post-mood {
      font-size: 11px;
      color: var(--amber-200);
      background: rgba(245, 158, 11, 0.15);
      padding: 2px 8px;
      border-radius: 999px;
      margin-bottom: 8px;
      display: inline-block;
    }

    .post-content {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-secondary);
    }

    .post-footer {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .post-action {
      display: flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .post-action:active { background: rgba(255,255,255,0.05); }
    .post-action.liked { color: #f87171; }

    /* ====== Space Page ====== */
    .space-header {
      border-radius: var(--card-radius);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }

    .space-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--amber-500), var(--amber-600));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.25);
    }

    .space-avatar svg {
      width: 28px;
      height: 28px;
      fill: white;
    }

    .space-name { font-size: 18px; font-weight: 700; color: var(--amber-100); }
    .space-desc { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    .stats-bar {
      display: flex;
      border-radius: var(--card-radius);
      padding: 16px;
      margin-bottom: 16px;
    }

    .stat-item {
      flex: 1;
      text-align: center;
      position: relative;
    }

    .stat-item:not(:last-child)::after {
      content: '';
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 1px;
      height: 32px;
      background: rgba(255,255,255,0.1);
    }

    .stat-value {
      font-size: 24px;
      font-weight: 800;
      color: var(--amber-400);
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .tabs {
      display: flex;
      border-radius: var(--card-radius);
      padding: 4px;
      margin-bottom: 16px;
    }

    .tab-btn {
      flex: 1;
      padding: 8px;
      background: none;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s ease;
    }

    .tab-btn.active {
      background: var(--amber-500);
      color: white;
      box-shadow: 0 2px 8px rgba(245, 158, 11, 0.2);
    }

    .tab-content { min-height: 200px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: flex; flex-direction: column; gap: 12px; }

    .caught-card {
      border-radius: var(--card-radius);
      padding: 16px;
      position: relative;
      border-left: 3px solid var(--amber-500);
    }

    .caught-text {
      font-family: var(--font-serif);
      font-size: 15px;
      line-height: 1.7;
      color: var(--amber-50);
      margin-bottom: 8px;
    }

    .caught-source { font-size: 12px; color: var(--text-muted); }

    .caught-remove {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 24px;
      height: 24px;
      background: rgba(255,255,255,0.05);
      border: none;
      border-radius: 50%;
      font-size: 12px;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .caught-remove:active { background: rgba(248, 113, 113, 0.2); color: #f87171; }

    /* Empty State */
    .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .empty-text { font-size: 14px; }

    /* ====== Bottom Nav ====== */
    .nav {
      position: absolute;
      bottom: 0;
      width: 100%;
      border-top: 1px solid rgba(255,255,255,0.1);
      z-index: 20;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    .nav-inner {
      display: flex;
      justify-content: space-around;
      align-items: center;
      height: 64px;
    }

    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      height: 100%;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      transition: color 0.3s ease;
    }

    .nav-btn.active { color: var(--amber-300); }

    .nav-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      margin-bottom: 4px;
    }

    .nav-btn span { font-size: 11px; }

    /* ====== Toast ====== */
    #toast-container {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 75%;
      pointer-events: none;
      z-index: 50;
    }

    .toast {
      background: rgba(0, 0, 0, 0.8);
      color: var(--amber-100);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      text-align: center;
      backdrop-filter: blur(8px);
      animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes toastOut {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-16px); }
    }

    /* ====== Slide Animations ====== */
    .slide-out-left { animation: slideOutLeft 0.3s ease forwards; }
    .slide-in-right { animation: slideInRight 0.3s ease forwards; }
    .slide-out-right { animation: slideOutRight 0.3s ease forwards; }
    .slide-in-left { animation: slideInLeft 0.3s ease forwards; }

    @keyframes slideOutLeft {
      to { transform: translateX(-100%); opacity: 0; }
    }

    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes slideOutRight {
      to { transform: translateX(100%); opacity: 0; }
    }

    @keyframes slideInLeft {
      from { transform: translateX(-100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-title">
        <h1>微光</h1>
        <p>每日微光，照亮心房</p>
      </div>
      <div class="header-bulb">
        <svg viewBox="0 0 384 512"><path d="M292.9 384c7.3-22.3 21.9-42.5 38.4-59.9 32.7-34.4 52.7-80.9 52.7-132.1 0-106-86-192-192-192S0 86 0 192c0 51.2 20 97.7 52.7 132.1 16.5 17.4 31.2 37.6 38.4 59.9l201.7 0zM288 432l-192 0 0 16c0 44.2 35.8 80 80 80l32 0c44.2 0 80-35.8 80-80l0-16zM184 112c-39.8 0-72 32.2-72 72 0 13.3-10.7 24-24 24s-24-10.7-24-24c0-66.3 53.7-120 120-120 13.3 0 24 10.7 24 24s-10.7 24-24 24z"/></svg>
      </div>
    </header>

    <!-- Main -->
    <main class="main" id="main-content">
      <!-- Recommend Page -->
      <section class="page active" id="pageRecommend">
        <div class="quote-card glass" id="quoteCard">
          <div class="quote-inner">
            <div class="quote-badge" id="quoteBadge">
              <svg viewBox="0 0 576 512"><path d="M178.2-10.1c7.4-3.1 15.8-2.2 22.5 2.2l87.8 58.2 87.8-58.2c6.7-4.4 15.1-5.2 22.5-2.2S411.4-.5 413 7.3l20.9 103.2 103.2 20.9c7.8 1.6 14.4 7 17.4 14.3s2.2 15.8-2.2 22.5l-58.2 87.8 58.2 87.8c4.4 6.7 5.2 15.1 2.2 22.5s-9.6 12.8-17.4 14.3L433.8 401.4 413 504.7c-1.6 7.8-7 14.4-14.3 17.4s-15.8 2.2-22.5-2.2l-87.8-58.2-87.8 58.2c-6.7 4.4-15.1 5.2-22.5 2.2s-12.8-9.6-14.3-17.4L143 401.4 39.7 380.5c-7.8-1.6-14.4-7-17.4-14.3s-2.2-15.8 2.2-22.5L82.7 256 24.5 168.2c-4.4-6.7-5.2-15.1-2.2-22.5s9.6-12.8 17.4-14.3L143 110.6 163.9 7.3c1.6-7.8 7-14.4 14.3-17.4zM207.6 256a80.4 80.4 0 1 1 160.8 0 80.4 80.4 0 1 1 -160.8 0zm208.8 0a128.4 128.4 0 1 0 -256.8 0 128.4 128.4 0 1 0 256.8 0z"/></svg>
              <span id="badgeText">晨曦之光</span>

  <script>
const quotes = [

  { id: 'q3', zh: '我们终此一生，就是要摆脱他人的期待，找到真正的自己。', en: 'We spend our whole lives trying to break free from others\' expectations and find our true selves.', source: '无声告白', author: '伍绮诗', context: '关于自我认知与人生意义的深刻思考', tag: '#自我', type: 'book', badge: '晨曦之光' },

  { id: 'q5', zh: '所有的大人都曾经是小孩，虽然，只有少数的人记得。', en: 'All grown-ups were once children, but only few of them remember it.', source: '小王子', author: '圣埃克苏佩里', context: '提醒我们保持童心与纯真', tag: '#童心', type: 'book', badge: '晨曦之光' },
  { id: 'q6', zh: '人是为了活着本身而活着，而不是为了活着之外的任何事物而活着。', en: 'People live for the sake of living itself, not for anything beyond life.', source: '活着', author: '余华', context: '对生命本质最朴素的诠释', tag: '#生命', type: 'book', badge: '晨曦之光' },
  { id: 'q7', zh: '愿你出走半生，归来仍是少年。', en: 'May you travel half your life and return still young at heart.', source: '愿你出走半生，归来仍是少年', author: '孙衍', context: '对初心不改的美好祝愿', tag: '#少年', type: 'book', badge: '晨曦之光' },
  { id: 'q8', zh: '温柔半两，从容一生。', en: 'Half an ounce of gentleness, a lifetime of composure.', source: '等一朵花开', author: '林帝浣', context: '平淡中见真味的生活哲学', tag: '#从容', type: 'book', badge: '晨曦之光' },
  { id: 'q9', zh: '没有人是一座孤岛，在大海里独踞。', en: 'No man is an island, entire of itself.', source: '没有人是一座孤岛', author: '约翰·多恩', context: '人与人之间深刻联系的诗意表达', tag: '#连接', type: 'book', badge: '晨曦之光' },
  { id: 'q10', zh: '岁月极美，在于它必然的流逝。春花、秋月、夏日、冬雪。', en: 'Time is beautiful precisely because it inevitably passes. Spring flowers, autumn moon, summer days, winter snow.', source: '三毛全集', author: '三毛', context: '对时光流转的温柔感悟', tag: '#时光', type: 'book', badge: '晨曦之光' }
];

const musicTones = {
  '#希望': [523.25, 659.25, 783.99],
  '#勇气': [493.88, 622.25, 739.99],
  '#自我': [440.00, 554.37, 659.25],
  '#英雄主义': [392.00, 493.88, 587.33],
  '#童心': [523.25, 587.33, 698.46],
  '#生命': [440.00, 523.25, 659.25],
  '#少年': [587.33, 659.25, 783.99],
  '#从容': [392.00, 440.00, 523.25],
  '#连接': [523.25, 659.25, 783.99],
  '#时光': [440.00, 554.37, 659.25],
  default: [523.25, 659.25, 783.99]
};

let currentIndex = 0;
let currentQuote = null;
let isPlaying = false;
let audioCtx = null;
let currentOscillators = [];
let isDragging = false;
let startY = 0;

const store = {
  key: 'wg_data',
  data: null,
  init() {
    const s = localStorage.getItem(this.key);
    this.data = s ? JSON.parse(s) : { caught: [], posts: [], comments: {} };
  },
  save() { localStorage.setItem(this.key, JSON.stringify(this.data)); },
  addCaught(q) {
    if (!this.data.caught.find(x => x.id === q.id)) {
      this.data.caught.unshift(q);
      this.save();
    }
  },
  removeCaught(id) {
    this.data.caught = this.data.caught.filter(x => x.id !== id);
    this.save();
  },
  isCaught(id) { return this.data.caught.some(x => x.id === id); },
  getPosts() { return this.data.posts; },
  addPost(p) {
    this.data.posts.unshift({ id: 'p' + Date.now(), ...p, time: Date.now(), likes: 0 });
    this.save();
  },
  delPost(id) {
    this.data.posts = this.data.posts.filter(x => x.id !== id);
    this.save();
  },
  isLikedQuote(id) { return this.data.likedQuotes && this.data.likedQuotes.includes(id); },
  isLikedPost(id) { return this.data.likedPosts && this.data.likedPosts.includes(id); },
  toggleLikeQuote(id) {
    if (!this.data.likedQuotes) this.data.likedQuotes = [];
    const i = this.data.likedQuotes.indexOf(id);
    if (i === -1) this.data.likedQuotes.push(id);
    else this.data.likedQuotes.splice(i, 1);
    this.save();
    return i === -1;
  },
  toggleLikePost(id) {
    if (!this.data.likedPosts) this.data.likedPosts = [];
    const i = this.data.likedPosts.indexOf(id);
    const post = this.data.posts.find(x => x.id === id);
    if (post) post.likes += (i === -1 ? 1 : -1);
    if (i === -1) this.data.likedPosts.push(id);
    else this.data.likedPosts.splice(i, 1);
    this.save();
    return i === -1;
  }
};

function showToast(msg) {
  const container = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  container.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

function renderQuote(direction) {
  const q = currentQuote;
  const card = document.getElementById('quoteCard');

  if (direction) {
    card.classList.remove('slide-in-left', 'slide-in-right');
    card.classList.add(direction === 'next' ? 'slide-in-right' : 'slide-in-left');
  }

  document.getElementById('quoteZh').textContent = `"${q.zh}"`;
  document.getElementById('quoteEn').textContent = q.en || '';
  document.getElementById('quoteSource').textContent = `——《${q.source}》`;
  document.getElementById('quoteContext').textContent = q.context || '';
  document.getElementById('quoteTag').textContent = q.tag || '';
  document.getElementById('quoteTag').style.display = q.tag ? 'inline-block' : 'none';
  document.getElementById('badgeText').textContent = q.badge || '晨曦之光';
  document.getElementById('likeCount').textContent = Math.floor(Math.random() * 300) + 50;

  const liked = store.isLikedQuote(q.id);
  document.getElementById('likeBtn').classList.toggle('liked', liked);
  document.getElementById('catchBtn').classList.toggle('caught', store.isCaught(q.id));

  // Dots
  const dots = document.getElementById('quoteDots');
  dots.innerHTML = quotes.map((_, i) => `<span class="${i === currentIndex ? 'active' : ''}"></span>`).join('');

  // Comment area hidden
  document.getElementById('commentArea').classList.remove('show');
  document.getElementById('commentCount').textContent = '0';
}

function showQuote(direction) {
  currentQuote = quotes[currentIndex];
  stopMusic();
  renderQuote(direction);
}

function nextQuote() {
  currentIndex = (currentIndex + 1) % quotes.length;
  showQuote('next');
}

function prevQuote() {
  currentIndex = (currentIndex - 1 + quotes.length) % quotes.length;
  showQuote('prev');
}

function playMusic() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  stopMusic();
  const tag = currentQuote.tag || 'default';
  const notes = musicTones[tag] || musicTones.default;
  const now = audioCtx.currentTime;
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, now + i * 0.6);
    gain.gain.setValueAtTime(0, now + i * 0.6);
    gain.gain.linearRampToValueAtTime(0.08, now + i * 0.6 + 0.1);
    gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.6 + 0.8);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now + i * 0.6);
    osc.stop(now + i * 0.6 + 0.9);
    currentOscillators.push(osc);
  });
  isPlaying = true;
  setTimeout(() => { isPlaying = false; }, 3000);
}

function stopMusic() {
  currentOscillators.forEach(osc => { try { osc.stop(); } catch(e) {} });
  currentOscillators = [];
  isPlaying = false;
}

function switchPage(name) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.page === name));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === 'page' + name));
  if (name === 'Space') refreshSpace();
  if (name === 'Publish') refreshPublishPosts();
}

function refreshSpace() {
  const caught = store.data.caught;
  const posts = store.data.posts;
  const totalLikes = posts.reduce((s, p) => s + (p.likes || 0), 0);
  document.getElementById('catchTotal').textContent = caught.length;
  document.getElementById('postTotal').textContent = posts.length;
  document.getElementById('likeTotal').textContent = totalLikes;

  const caughtEl = document.getElementById('caughtList');
  const postsEl = document.getElementById('spacePostsList');
  const emptyEl = document.getElementById('emptySpace');

  if (!caught.length && !posts.length) {
    caughtEl.innerHTML = '';
    postsEl.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  caughtEl.innerHTML = caught.length ? caught.map(q => `
    <div class="caught-card glass">
      <div class="caught-text">${q.zh}</div>
      <div class="caught-source">——《${q.source}》</div>
      <button class="caught-remove" onclick="removeCaught('${q.id}')">✕</button>
    </div>
  `).join('') : '<div class="empty"><div class="empty-icon">✦</div><div class="empty-text">暂无捕捉</div></div>';

  postsEl.innerHTML = posts.length ? posts.map(p => `
    <div class="post-card glass">
      <div class="post-header">
        <span class="post-user">微光用户</span>
        <span class="post-time">${formatTime(p.time)}</span>
      </div>
      ${p.mood ? '<span class="post-mood">' + p.mood + '</span>' : ''}
      <div class="post-content">${p.content}</div>
      <div class="post-footer">
        <button class="post-action ${store.isLikedPost(p.id) ? 'liked' : ''}" onclick="togglePostLike('${p.id}')">♥ ${p.likes || 0}</button>
        <button class="post-action" onclick="delPost('${p.id}')">删除</button>
      </div>
    </div>
  `).join('') : '<div class="empty"><div class="empty-icon">📝</div><div class="empty-text">暂无发布</div></div>';
}

function refreshPublishPosts() {
  const posts = store.data.posts;
  const listEl = document.getElementById('publishPostsList');
  const emptyEl = document.getElementById('emptyPosts');
  if (!posts.length) {
    listEl.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';
  listEl.innerHTML = posts.map(p => `
    <div class="post-card glass">
      <div class="post-header">
        <span class="post-user">微光用户</span>
        <span class="post-time">${formatTime(p.time)}</span>
      </div>
      ${p.mood ? '<span class="post-mood">' + p.mood + '</span>' : ''}
      <div class="post-content">${p.content}</div>
      <div class="post-footer">
        <button class="post-action ${store.isLikedPost(p.id) ? 'liked' : ''}" onclick="togglePostLike('${p.id}')">♥ ${p.likes || 0}</button>
      </div>
    </div>
  `).join('');
}

function formatTime(ts) {
  const d = Date.now() - ts;
  if (d < 60000) return '刚刚';
  if (d < 3600000) return Math.floor(d / 60000) + '分钟前';
  if (d < 86400000) return Math.floor(d / 3600000) + '小时前';
  return Math.floor(d / 86400000) + '天前';
}

function removeCaught(id) {
  store.removeCaught(id);
  refreshSpace();
  showToast('已取消捕捉');
}

function delPost(id) {
  store.delPost(id);
  refreshSpace();
  refreshPublishPosts();
  showToast('已删除');
}

function togglePostLike(id) {
  store.toggleLikePost(id);
  refreshSpace();
  refreshPublishPosts();
}

// Init
store.init();
showQuote();

// Nav
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => switchPage(btn.dataset.page));
});

// Like
document.getElementById('likeBtn').addEventListener('click', () => {
  if (!currentQuote) return;
  store.toggleLikeQuote(currentQuote.id);
  document.getElementById('likeBtn').classList.toggle('liked', store.isLikedQuote(currentQuote.id));
});

// Catch
document.getElementById('catchBtn').addEventListener('click', () => {
  if (!currentQuote) return;
  if (store.isCaught(currentQuote.id)) {
    showToast('已捕捉过');
    return;
  }
  store.addCaught(currentQuote);
  document.getElementById('catchBtn').classList.add('caught');
  showToast('捕捉成功！');
});

// Comment toggle
document.getElementById('commentBtn').addEventListener('click', () => {
  document.getElementById('commentArea').classList.toggle('show');
  if (document.getElementById('commentArea').classList.contains('show')) {
    document.getElementById('commentInput').focus();
  }
});

document.getElementById('commentSend').addEventListener('click', () => {
  const val = document.getElementById('commentInput').value.trim();
  if (!val) return;
  showToast('评论成功！');
  document.getElementById('commentInput').value = '';
  document.getElementById('commentArea').classList.remove('show');
  const c = parseInt(document.getElementById('commentCount').textContent) + 1;
  document.getElementById('commentCount').textContent = c;
});

// Publish
document.getElementById('publishBtn').addEventListener('click', () => {
  const input = document.getElementById('publishInput');
  const content = input.value.trim();
  if (!content) { showToast('请输入内容'); return; }
  const mood = document.querySelector('.mood-tag.active').dataset.mood;
  store.addPost({ content, mood });
  input.value = '';
  refreshPublishPosts();
  showToast('发布成功！');
});

document.querySelectorAll('.mood-tag').forEach(tag => {
  tag.addEventListener('click', () => {
    document.querySelectorAll('.mood-tag').forEach(t => t.classList.remove('active'));
    tag.classList.add('active');
  });
});

// Tabs
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === btn.dataset.tab + 'List'));
  });
});

// Swipe
const card = document.getElementById('quoteCard');

card.addEventListener('touchstart', e => {
  if (e.target.closest('button') || e.target.closest('input')) return;
  isDragging = true;
  startY = e.touches[0].clientY;
  card.style.transition = 'none';
}, { passive: true });

card.addEventListener('touchmove', e => {
  if (!isDragging) return;
  const diff = e.touches[0].clientY - startY;
  const move = Math.max(-60, Math.min(60, diff));
  card.style.transform = `translateY(${move}px)`;
  card.style.opacity = 1 - Math.abs(move) / 120;
}, { passive: true });

card.addEventListener('touchend', e => {
  if (!isDragging) return;
  isDragging = false;
  card.style.transition = '';
  card.style.transform = '';
  card.style.opacity = '';
  const diff = startY - e.changedTouches[0].clientY;
  if (Math.abs(diff) > 40) {
    diff > 0 ? nextQuote() : prevQuote();
  }
});
  </script>
</body>
