<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="每日金句语录 - 每日微光，照亮心房">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Glimmer - 每日微光，照亮心房</title>
  <style>
    /* ====== Design Tokens ====== */
    :root {
      --amber-50: #fffbf7;
      --amber-100: #fef3c7;
      --amber-200: #fde68a;
      --amber-300: #fcd34d;
      --amber-400: #fbbf24;
      --amber-500: #f59e0b;
      --amber-600: #d97706;
      --bg-start: #0f172a;
      --bg-mid: #1e1b4b;
      --bg-end: #312e81;
      --text-primary: #f3f4f6;
      --text-secondary: #d1d5db;
      --text-muted: #9ca3af;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: rgba(0, 0, 0, 0.1) 0px 4px 30px;
      --card-radius: 16px;
      --font-sans: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      --font-serif: ui-serif, Georgia, Cambria, 'Times New Roman', serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: var(--font-sans);
      color: var(--text-primary);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ====== Background ====== */
    .app {
      height: 100%;
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-mid) 50%, var(--bg-end) 100%);
    }

    .app::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 60%);
      animation: glimmer-rotate 20s linear infinite;
      pointer-events: none;
    }

    @keyframes glimmer-rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* ====== Glass Card ====== */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
    }

    /* ====== Header ====== */
    .header {
      padding: 24px 24px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 10;
      background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, transparent 100%);
    }

    .header-title h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--amber-100);
      letter-spacing: 2px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .header-title p {
      font-size: 11px;
      color: var(--amber-200);
      opacity: 0.7;
      letter-spacing: 3px;
      margin-top: 4px;
    }

    .header-bulb {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(251, 191, 36, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s ease-in-out infinite;
    }

    .header-bulb svg {
      width: 16px;
      height: 16px;
      fill: var(--amber-300);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.05); }
    }

    /* ====== Main Content ====== */
    .main {
      flex: 1;
      overflow-y: auto;
      position: relative;
      padding: 16px;
      padding-bottom: 96px;
      scrollbar-width: none;
    }

    .main::-webkit-scrollbar { display: none; }

    .page {
      position: absolute;
      inset: 0;
      padding: 16px;
      padding-bottom: 96px;
      overflow-y: auto;
      display: none;
      scrollbar-width: none;
    }

    .page::-webkit-scrollbar { display: none; }
    .page.active { display: flex; flex-direction: column; }

    /* ====== Quote Card ====== */
    .quote-card {
      border-radius: var(--card-radius);
      overflow: hidden;
      position: relative;
      transition: transform 0.3s ease, opacity 0.3s ease;
      touch-action: pan-y;
      user-select: none;
    }

    .quote-card::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 128px;
      height: 128px;
      background: rgba(245, 158, 11, 0.2);
      border-radius: 50%;
      filter: blur(64px);
      pointer-events: none;
    }

    .quote-inner {
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .quote-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 0, 0, 0.2);
      padding: 4px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 16px;
    }

    .quote-badge svg {
      width: 14px;
      height: 14px;
      fill: var(--amber-300);
      animation: pulse 2s ease-in-out infinite;
    }

    .quote-badge span {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .quote-wave {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 12px;
      margin-left: 4px;
    }

    .quote-wave span {
      width: 2px;
      background: rgba(255,255,255,0.5);
      border-radius: 1px;
      animation: wave-bounce 1s ease-in-out infinite;
    }

    .quote-wave span:nth-child(1) { height: 8px; animation-delay: 0s; }
    .quote-wave span:nth-child(2) { height: 12px; animation-delay: 0.2s; }
    .quote-wave span:nth-child(3) { height: 4px; animation-delay: 0.4s; }

    @keyframes wave-bounce {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.5); }
    }

    .quote-content {
      min-height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .quote-zh {
      font-family: var(--font-serif);
      font-size: 20px;
      line-height: 1.8;
      color: var(--amber-50);
      font-weight: 500;
      margin-bottom: 16px;
    }

    .quote-en {
      font-family: var(--font-serif);
      font-size: 14px;
      font-style: italic;
      color: var(--text-muted);
      border-left: 2px solid rgba(245, 158, 11, 0.3);
      padding-left: 12px;
      margin-bottom: 16px;
    }

    .quote-source {
      font-size: 14px;
      color: var(--amber-200);
      opacity: 0.8;
      font-weight: 600;
    }

    .quote-context {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-top: 8px;
    }

    .quote-tag {
      display: inline-block;
      padding: 2px 8px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 4px;
      font-size: 12px;
      color: var(--amber-200);
      margin-top: 12px;
    }

    /* Quote Actions */
    .quote-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .quote-actions-left {
      display: flex;
      gap: 16px;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      transition: color 0.2s ease;
      padding: 4px;
    }

    .action-btn:hover { color: var(--amber-300); }
    .action-btn svg { width: 20px; height: 20px; fill: currentColor; }
    .action-btn span { font-size: 13px; }

    .action-btn.liked { color: #f87171; }
    .action-btn.liked svg { animation: heartBeat 0.4s ease; }

    .action-btn.caught { color: var(--amber-300); }

    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.25); }
    }

    .capture-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(245, 158, 11, 0.2);
      border: 1px solid rgba(245, 158, 11, 0.3);
      padding: 6px 12px;
      border-radius: 999px;
      color: var(--amber-300);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .capture-btn:hover { background: rgba(245, 158, 11, 0.3); }
    .capture-btn svg { width: 16px; height: 16px; fill: currentColor; }

    /* Comment Area */
    .comment-area {
      margin-top: 16px;
      display: none;
    }

    .comment-area.show { display: block; animation: fadeIn 0.3s ease; }

    .comment-input-wrap {
      display: flex;
      gap: 8px;
    }

    .comment-input {
      flex: 1;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s ease;
    }

    .comment-input:focus { border-color: rgba(245, 158, 11, 0.5); }

    .comment-send {
      background: var(--amber-500);
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .comment-send:hover { background: var(--amber-600); }

    /* Pagination Dots */
    .quote-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 24px;
    }

    .quote-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transition: all 0.3s ease;
    }

    .quote-dots span.active {
      background: var(--amber-400);
      width: 24px;
      border-radius: 4px;
    }

    /* Card Loading Overlay */
    .card-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(8px);
      border-radius: var(--card-radius);
      z-index: 10;
      gap: 12px;
    }

    .loading-spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: var(--amber-400);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .card-loading span {
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* ====== Publish Page ====== */
    .publish-card {
      border-radius: var(--card-radius);
      padding: 16px;
      margin-bottom: 16px;
    }

    .publish-textarea {
      width: 100%;
      min-height: 120px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      line-height: 1.7;
      resize: none;
      outline: none;
      font-family: inherit;
      color: var(--text-primary);
      transition: border-color 0.2s ease;
    }

    .publish-textarea::placeholder { color: var(--text-muted); opacity: 0.6; }
    .publish-textarea:focus { border-color: rgba(245, 158, 11, 0.5); }

    .publish-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
    }

    .mood-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mood-tag {
      padding: 6px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      font-size: 12px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s ease;
    }

    .mood-tag.active {
      background: var(--amber-500);
      border-color: var(--amber-500);
      color: white;
    }

    .publish-btn {
      padding: 8px 20px;
      background: var(--amber-500);
      color: white;
      border: none;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .publish-btn:active { transform: scale(0.95); }
    .publish-btn:hover { background: var(--amber-600); }

    /* Post Cards */
    .posts-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .post-card {
      border-radius: var(--card-radius);
      padding: 16px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .post-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .post-user { font-size: 14px; font-weight: 600; color: var(--amber-100); }
    .post-time { font-size: 12px; color: var(--text-muted); }

    .post-mood {
      font-size: 11px;
      color: var(--amber-200);
      background: rgba(245, 158, 11, 0.15);
      padding: 2px 8px;
      border-radius: 999px;
      margin-bottom: 8px;
      display: inline-block;
    }

    .post-content {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-secondary);
    }

    .post-footer {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .post-action {
      display: flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .post-action:active { background: rgba(255,255,255,0.05); }
    .post-action.liked { color: #f87171; }

    /* ====== Space Page ====== */
    .space-header {
      border-radius: var(--card-radius);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }

    .space-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--amber-500), var(--amber-600));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.25);
    }

    .space-avatar svg {
      width: 28px;
      height: 28px;
      fill: white;
    }

    .space-name { font-size: 18px; font-weight: 700; color: var(--amber-100); }
    .space-desc { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    .stats-bar {
      display: flex;
      border-radius: var(--card-radius);
      padding: 16px;
      margin-bottom: 16px;
    }

    .stat-item {
      flex: 1;
      text-align: center;
      position: relative;
    }

    .stat-item:not(:last-child)::after {
      content: '';
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 1px;
      height: 32px;
      background: rgba(255,255,255,0.1);
    }

    .stat-value {
      font-size: 24px;
      font-weight: 800;
      color: var(--amber-400);
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .tabs {
      display: flex;
      border-radius: var(--card-radius);
      padding: 4px;
      margin-bottom: 16px;
    }

    .tab-btn {
      flex: 1;
      padding: 8px;
      background: none;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s ease;
    }

    .tab-btn.active {
      background: var(--amber-500);
      color: white;
      box-shadow: 0 2px 8px rgba(245, 158, 11, 0.2);
    }

    .tab-content { min-height: 200px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: flex; flex-direction: column; gap: 12px; }

    .caught-card {
      border-radius: var(--card-radius);
      padding: 16px;
      position: relative;
      border-left: 3px solid var(--amber-500);
    }

    .caught-text {
      font-family: var(--font-serif);
      font-size: 15px;
      line-height: 1.7;
      color: var(--amber-50);
      margin-bottom: 8px;
    }

    .caught-source { font-size: 12px; color: var(--text-muted); }

    .caught-remove {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 24px;
      height: 24px;
      background: rgba(255,255,255,0.05);
      border: none;
      border-radius: 50%;
      font-size: 12px;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .caught-remove:active { background: rgba(248, 113, 113, 0.2); color: #f87171; }

    /* Empty State */
    .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .empty-text { font-size: 14px; }

    /* ====== Bottom Nav ====== */
    .nav {
      position: absolute;
      bottom: 0;
      width: 100%;
      border-top: 1px solid rgba(255,255,255,0.1);
      z-index: 20;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    .nav-inner {
      display: flex;
      justify-content: space-around;
      align-items: center;
      height: 64px;
    }

    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      height: 100%;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      transition: color 0.3s ease;
    }

    .nav-btn.active { color: var(--amber-300); }

    .nav-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      margin-bottom: 4px;
    }

    .nav-btn span { font-size: 11px; }

    /* ====== Toast ====== */
    #toast-container {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 75%;
      pointer-events: none;
      z-index: 50;
    }

    .toast {
      background: rgba(0, 0, 0, 0.8);
      color: var(--amber-100);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      text-align: center;
      backdrop-filter: blur(8px);
      animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes toastOut {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-16px); }
    }

    /* ====== Slide Animations ====== */
    .slide-out-left { animation: slideOutLeft 0.3s ease forwards; }
    .slide-in-right { animation: slideInRight 0.3s ease forwards; }
    .slide-out-right { animation: slideOutRight 0.3s ease forwards; }
    .slide-in-left { animation: slideInLeft 0.3s ease forwards; }

    @keyframes slideOutLeft {
      to { transform: translateX(-100%); opacity: 0; }
    }

    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes slideOutRight {
      to { transform: translateX(100%); opacity: 0; }
    }

    @keyframes slideInLeft {
      from { transform: translateX(-100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* ====== Header Actions ====== */
    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-bulb {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(251, 191, 36, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s ease-in-out infinite;
    }

    .header-bulb svg {
      width: 16px;
      height: 16px;
      fill: var(--amber-300);
    }

    .header-settings {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .header-settings:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .header-settings svg {
      width: 16px;
      height: 16px;
      fill: var(--amber-300);
    }

    /* ====== Settings Panel ====== */
    .settings-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .settings-overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .settings-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.95);
      width: 90%;
      max-width: 400px;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 28px;
      z-index: 101;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
    }

    .settings-panel.show {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, -50%) scale(1);
    }

    .settings-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--amber-100);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .settings-title svg {
      width: 20px;
      height: 20px;
      fill: var(--amber-400);
    }

    .settings-group {
      margin-bottom: 20px;
    }

    .settings-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: block;
    }

    .settings-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s ease;
    }

    .settings-input:focus {
      border-color: rgba(245, 158, 11, 0.5);
    }

    .settings-input::placeholder {
      color: var(--text-muted);
      opacity: 0.6;
    }

    .settings-select {
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
      appearance: none;
      cursor: pointer;
      transition: border-color 0.2s ease;
    }

    .settings-select:focus {
      border-color: rgba(245, 158, 11, 0.5);
    }

    .settings-select option {
      background: #1e1b4b;
      color: var(--text-primary);
    }

    .settings-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
      line-height: 1.5;
    }

    .settings-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      margin-top: 8px;
    }

    .settings-status.success { color: #4ade80; }
    .settings-status.error { color: #f87171; }
    .settings-status.checking { color: var(--amber-400); }

    .settings-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .settings-btn {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
    }

    .settings-btn.primary {
      background: var(--amber-500);
      color: white;
    }

    .settings-btn.primary:hover {
      background: var(--amber-600);
    }

    .settings-btn.secondary {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-secondary);
    }

    .settings-btn.secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .settings-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .settings-quota {
      margin-top: 16px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .settings-quota-label {
      font-size: 12px;
      color: var(--text-muted);
    }

    .settings-quota-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--amber-400);
    }

// ====== Security Utilities ======
function escapeHtml(str) {
  if (!str) return '';
  const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;', '/': '&#x2F;', '`': '&#96;' };
  return String(str).replace(/[&<>"'`\/]/g, c => map[c]);
}

function safeAttribute(val) {
  if (!val) return '';
  return String(val).replace(/'/g, '&#39;').replace(/"/g, '&quot;');
}

// ====== Secure Storage ======
const SecureStorage = {
  _encode(str) {
    if (!str) return '';
    try {
      const encoded = btoa(unescape(encodeURIComponent(str)));
      return 'enc:' + encoded.split('').reverse().join('');
    } catch(e) {
      return str;
    }
  },

  _decode(str) {
    if (!str || !str.startsWith('enc:')) return str;
    try {
      const reversed = str.slice(4).split('').reverse().join('');
      return decodeURIComponent(escape(atob(reversed)));
    } catch(e) {
      return str.slice(4);
    }
  },

  setKey(key) {
    localStorage.setItem('glimmer_api_config_key', this._encode(key));
  },

  getKey() {
    return this._decode(localStorage.getItem('glimmer_api_config_key'));
  }
};

// ====== Quote Constants ======
const QUOTE_CONSTANTS = {
  MAX_CACHE: 50,
  MAX_HISTORY: 200,
  CACHE_LOW_THRESHOLD: 5,
  PRELOAD_TRIGGER: 3,
  SIMILARITY_THRESHOLD: 0.8,
  DAILY_QUOTA_LIMIT: 100,
  API_TIMEOUT_MS: 5000,
  COOLDOWN_DURATION_MS: 30 * 60 * 1000,
  COOLDOWN_FAILURE_COUNT: 3,
  BATCH_GENERATE_DELAY_MS: 500,
  MAX_VISIBLE_DOTS: 10,
  LIKE_COUNT_BASE: 50,
  LIKE_COUNT_RANGE: 300
};

const store = {
  key: 'wg_data',
  data: null,
  init() {
    const s = localStorage.getItem(this.key);
    this.data = s ? JSON.parse(s) : { caught: [], posts: [], comments: {} };
  },
  save() { localStorage.setItem(this.key, JSON.stringify(this.data)); },
  addCaught(q) {
    if (!this.data.caught.find(x => x.id === q.id)) {
      this.data.caught.unshift(q);
      this.save();
    }
  },
  removeCaught(id) {
    this.data.caught = this.data.caught.filter(x => x.id !== id);
    this.save();
  },
  isCaught(id) { return this.data.caught.some(x => x.id === id); },
  getPosts() { return this.data.posts; },
  addPost(p) {
    this.data.posts.unshift({ id: 'p' + Date.now(), ...p, time: Date.now(), likes: 0 });
    this.save();
  },
  delPost(id) {
    this.data.posts = this.data.posts.filter(x => x.id !== id);
    this.save();
  },
  isLikedQuote(id) { return this.data.likedQuotes && this.data.likedQuotes.includes(id); },
  isLikedPost(id) { return this.data.likedPosts && this.data.likedPosts.includes(id); },
  toggleLikeQuote(id) {
    if (!this.data.likedQuotes) this.data.likedQuotes = [];
    const i = this.data.likedQuotes.indexOf(id);
    if (i === -1) this.data.likedQuotes.push(id);
    else this.data.likedQuotes.splice(i, 1);
    this.save();
    return i === -1;
  },
  toggleLikePost(id) {
    if (!this.data.likedPosts) this.data.likedPosts = [];
    const i = this.data.likedPosts.indexOf(id);
    const post = this.data.posts.find(x => x.id === id);
    if (post) post.likes += (i === -1 ? 1 : -1);
    if (i === -1) this.data.likedPosts.push(id);
    else this.data.likedPosts.splice(i, 1);
    this.save();
    return i === -1;
  }
};

function showToast(msg) {
  const container = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  container.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

function renderQuote(direction) {
  const q = currentQuote;
  const card = document.getElementById('quoteCard');

  if (direction) {
    card.classList.remove('slide-in-left', 'slide-in-right');
    card.classList.add(direction === 'next' ? 'slide-in-right' : 'slide-in-left');
  }

  document.getElementById('quoteZh').textContent = `"${q.zh}"`;
  document.getElementById('quoteEn').textContent = q.en || '';
  document.getElementById('quoteSource').textContent = `——《${q.source}》`;
  document.getElementById('quoteContext').textContent = q.context || '';
  
  const categoryMap = {
    literature: '文学',
    philosophy: '哲学',
    psychology: '心理',
    counterintuitive: '反常识'
  };

  const catText = categoryMap[q.category] || '';
  const tagEl = document.getElementById('quoteTag');
  if (q.tag) {
    tagEl.style.display = 'inline-block';
    tagEl.textContent = q.tag;
    if (catText) {
      const span = document.createElement('span');
      span.style.opacity = '0.5';
      span.style.marginLeft = '4px';
      span.textContent = `· ${catText}`;
      tagEl.appendChild(span);
    }
  } else {
    tagEl.style.display = 'none';
  }
  
  document.getElementById('badgeText').textContent = q.badge || '晨曦之光';
  
  // Use deterministic like count based on quote ID
  const hash = q.id.split('').reduce((acc, c) => ((acc << 5) - acc + c.charCodeAt(0)) | 0, 0);
  document.getElementById('likeCount').textContent = QUOTE_CONSTANTS.LIKE_COUNT_BASE + (Math.abs(hash) % QUOTE_CONSTANTS.LIKE_COUNT_RANGE);

  const liked = store.isLikedQuote(q.id);
  document.getElementById('likeBtn').classList.toggle('liked', liked);
  document.getElementById('catchBtn').classList.toggle('caught', store.isCaught(q.id));

  // Dots - limit to max visible dots
  const dots = document.getElementById('quoteDots');
  const totalQuotes = quotes.length;
  const maxDots = QUOTE_CONSTANTS.MAX_VISIBLE_DOTS;
  
  if (totalQuotes <= maxDots) {
    dots.innerHTML = quotes.map((_, i) => `<span class="${i === currentIndex ? 'active' : ''}"></span>`).join('');
  } else {
    // Show relative position
    const progress = ((currentIndex + 1) / totalQuotes * 100).toFixed(0);
    dots.innerHTML = `<span style="color: var(--text-muted); font-size: 12px;">${currentIndex + 1} / ${totalQuotes} (${progress}%)</span>`;
  }

  // Comment area hidden
  document.getElementById('commentArea').classList.remove('show');
  document.getElementById('commentCount').textContent = '0';
}

// ====== Quote Cache ======
const quoteCache = {
  cacheKey: 'glimmer_cache',
  historyKey: 'glimmer_history',
  
  getCache() {
    try {
      return JSON.parse(localStorage.getItem(this.cacheKey)) || [];
    } catch(e) {
      return [];
    }
  },
  
  getHistory() {
    try {
      return JSON.parse(localStorage.getItem(this.historyKey)) || [];
    } catch(e) {
      return [];
    }
  },
  
  saveCache(cache) {
    // Trim to max capacity - keep newest entries
    if (cache.length > QUOTE_CONSTANTS.MAX_CACHE) {
      cache = cache.slice(-QUOTE_CONSTANTS.MAX_CACHE);
    }
    localStorage.setItem(this.cacheKey, JSON.stringify(cache));
  },
  
  saveHistory(history) {
    if (history.length > QUOTE_CONSTANTS.MAX_HISTORY) {
      history = history.slice(-QUOTE_CONSTANTS.MAX_HISTORY);
    }
    localStorage.setItem(this.historyKey, JSON.stringify(history));
  },
  
  // Similarity check using Levenshtein distance
  similarity(a, b) {
    if (!a || !b) return 0;
    if (a === b) return 1;
    const longer = a.length > b.length ? a : b;
    const shorter = a.length > b.length ? b : a;
    if (longer.length === 0) return 1;
    const costs = [];
    for (let i = 0; i <= shorter.length; i++) {
      let last = i;
      for (let j = 0; j <= longer.length; j++) {
        if (i === 0) costs[j] = j;
        else if (j === 0) costs[j] = last;
        else {
          const tmp = costs[j];
          costs[j] = Math.min(costs[j - 1] + 1, last + 1, last + (shorter[i - 1] === longer[j - 1] ? 0 : 1));
          last = tmp;
        }
      }
    }
    return 1 - costs[longer.length] / longer.length;
  },
  
  // Check if quote is duplicate based on similarity threshold
  isDuplicate(quote) {
    const history = this.getHistory();
    return history.some(h => this.similarity(h, quote.zh) > QUOTE_CONSTANTS.SIMILARITY_THRESHOLD);
  },
  
  async next() {
    const cache = this.getCache();
    if (cache.length === 0) return null;
    
    const entry = cache.shift();
    this.saveCache(cache);
    
    // Record to history
    const history = this.getHistory();
    history.push(entry.zh);
    this.saveHistory(history);
    
    // Trigger preload if needed
    if (cache.length <= QUOTE_CONSTANTS.PRELOAD_TRIGGER) {
      this.preload();
    }
    
    return entry;
  },
  
  add(quote) {
    const cache = this.getCache();
    cache.unshift(quote);
    this.saveCache(cache);
  },
  
  needsRefill() {
    return this.getCache().length < QUOTE_CONSTANTS.CACHE_LOW_THRESHOLD;
  },
  
  async preload() {
    if (!apiConfig.isConfigured() || !quotaManager.canGenerate()) return;
    
    const currentSize = this.getCache().length;
    const needed = QUOTE_CONSTANTS.CACHE_LOW_THRESHOLD + 2 - currentSize;
    
    if (needed <= 0) return;
    
    try {
      const newQuotes = await quoteGenerator.batchGenerate(needed);
      for (const q of newQuotes) {
        if (!this.isDuplicate(q)) {
          this.add(q);
        }
      }
    } catch(e) {
      console.warn('预加载失败:', e.message);
    }
  },
  
  clear() {
    localStorage.removeItem(this.cacheKey);
    localStorage.removeItem(this.historyKey);
  }
};

// ====== Quote Router ======
const quoteRouter = {
  consecutiveFailures: 0,
  cooldownUntil: 0,
  
  async getNextQuote() {
    // Check cooldown
    if (Date.now() < this.cooldownUntil) {
      return this.getFallbackQuote();
    }
    
    // Try cache first
    const cached = await quoteCache.next();
    if (cached) {
      this.consecutiveFailures = 0;
      return cached;
    }
    
    // Try LLM generation
    try {
      const quote = await quoteGenerator.generate();
      this.consecutiveFailures = 0;
      return quote;
    } catch(e) {
      this.consecutiveFailures++;
      
      // Cooldown after failure threshold
      if (this.consecutiveFailures >= QUOTE_CONSTANTS.COOLDOWN_FAILURE_COUNT) {
        this.cooldownUntil = Date.now() + QUOTE_CONSTANTS.COOLDOWN_DURATION_MS;
      }
      
      return this.getFallbackQuote();
    }
  },
  
  getFallbackQuote() {
    // Return a random preset quote without mutating state
    const idx = Math.floor(Math.random() * quotes.length);
    return {
      ...quotes[idx],
      isLLM: false
    };
  }
};

function showQuote(direction) {
  stopMusic();
  renderQuote(direction);
}

async function nextQuote() {
  // If we've gone through all preset quotes, switch to LLM mode
  if (currentIndex >= quotes.length - 1 || currentQuote.isLLM) {
    const loading = document.getElementById('cardLoading');
    loading.style.display = 'flex';
    try {
      const newQuote = await quoteRouter.getNextQuote();
      currentQuote = newQuote;
      // Only add to quotes array if it's a new LLM quote
      if (newQuote.isLLM) {
        quotes.push(newQuote);
        currentIndex = quotes.length - 1;
      }
      showQuote('next');
    } catch(e) {
      showToast('加载失败，稍后再试');
    } finally {
      loading.style.display = 'none';
    }
  } else {
    currentIndex = (currentIndex + 1) % quotes.length;
    currentQuote = quotes[currentIndex];
    showQuote('next');
  }
}

function prevQuote() {
  if (currentIndex > 0) {
    currentIndex--;
    currentQuote = quotes[currentIndex];
    showQuote('prev');
  }
}

function playMusic() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  stopMusic();
  const tag = currentQuote.tag || 'default';
  const notes = musicTones[tag] || musicTones.default;
  const now = audioCtx.currentTime;
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, now + i * 0.6);
    gain.gain.setValueAtTime(0, now + i * 0.6);
    gain.gain.linearRampToValueAtTime(0.08, now + i * 0.6 + 0.1);
    gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.6 + 0.8);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now + i * 0.6);
    osc.stop(now + i * 0.6 + 0.9);
    currentOscillators.push(osc);
  });
  isPlaying = true;
  setTimeout(() => { isPlaying = false; }, 3000);
}

function stopMusic() {
  currentOscillators.forEach(osc => { try { osc.stop(); } catch(e) {} });
  currentOscillators = [];
  isPlaying = false;
}

function switchPage(name) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.page === name));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === 'page' + name));
  if (name === 'Space') refreshSpace();
  if (name === 'Publish') refreshPublishPosts();
}

function refreshSpace() {
  const caught = store.data.caught;
  const posts = store.data.posts;
  const totalLikes = posts.reduce((s, p) => s + (p.likes || 0), 0);
  document.getElementById('catchTotal').textContent = caught.length;
  document.getElementById('postTotal').textContent = posts.length;
  document.getElementById('likeTotal').textContent = totalLikes;

  const caughtEl = document.getElementById('caughtList');
  const postsEl = document.getElementById('spacePostsList');
  const emptyEl = document.getElementById('emptySpace');

  if (!caught.length && !posts.length) {
    caughtEl.innerHTML = '';
    postsEl.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  caughtEl.innerHTML = caught.length ? caught.map(q => `
    <div class="caught-card glass">
      <div class="caught-text">${escapeHtml(q.zh)}</div>
      <div class="caught-source">——《${escapeHtml(q.source)}》</div>
      <button class="caught-remove" onclick="removeCaught('${safeAttribute(q.id)}')">✕</button>

  `).join('') : '<div class="empty"><div class="empty-icon">✦</div><div class="empty-text">暂无捕捉</div></div>';

  postsEl.innerHTML = posts.length ? posts.map(p => `
    <div class="post-card glass">
      <div class="post-header">
        <span class="post-user">微光用户</span>
        <span class="post-time">${escapeHtml(formatTime(p.time))}</span>
      </div>

      <div class="post-footer">
        <button class="post-action ${store.isLikedPost(p.id) ? 'liked' : ''}" onclick="togglePostLike('${safeAttribute(p.id)}')">♥ ${p.likes || 0}</button>
        <button class="post-action" onclick="delPost('${safeAttribute(p.id)}')">删除</button>
      </div>
    </div>
  `).join('') : '<div class="empty"><div class="empty-icon">📝</div><div class="empty-text">暂无发布</div></div>';
}

function refreshPublishPosts() {
  const posts = store.data.posts;
  const listEl = document.getElementById('publishPostsList');
  const emptyEl = document.getElementById('emptyPosts');
  if (!posts.length) {
    listEl.innerHTML = '';
    emptyEl.style.display = 'block';
    return;

    <div class="post-card glass">
      <div class="post-header">
        <span class="post-user">微光用户</span>
        <span class="post-time">${escapeHtml(formatTime(p.time))}</span>
      </div>
      ${p.mood ? '<span class="post-mood">' + escapeHtml(p.mood) + '</span>' : ''}
      <div class="post-content">${escapeHtml(p.content)}</div>
      <div class="post-footer">
        <button class="post-action ${store.isLikedPost(p.id) ? 'liked' : ''}" onclick="togglePostLike('${safeAttribute(p.id)}')">♥ ${p.likes || 0}</button>

function formatTime(ts) {
  const d = Date.now() - ts;
  if (d < 60000) return '刚刚';
  if (d < 3600000) return Math.floor(d / 60000) + '分钟前';
  if (d < 86400000) return Math.floor(d / 3600000) + '小时前';
  return Math.floor(d / 86400000) + '天前';
}

function togglePostLike(id) {

// ====== API Settings ======
const apiConfig = {
  key: null,
  model: 'qwen-turbo',
  baseUrl: 'https://dashscope.aliyuncs.com/compatible-mode/v1',
  
  load() {
    try {
      const raw = localStorage.getItem('glimmer_api_config');
      if (raw) {
        const parsed = JSON.parse(raw);
        // Try secure storage first, fallback to plain storage for migration
        this.key = SecureStorage.getKey() || parsed.key || null;
        this.model = parsed.model || 'qwen-turbo';
        this.baseUrl = parsed.baseUrl || 'https://dashscope.aliyuncs.com/compatible-mode/v1';
        
        // Migrate to secure storage if key was in plain storage
        if (this.key && !SecureStorage.getKey()) {
          SecureStorage.setKey(this.key);
          localStorage.setItem('glimmer_api_config', JSON.stringify({
            key: null,
            model: this.model,
            baseUrl: this.baseUrl
          }));
        }
      }
    } catch(e) {}
  },
  
  save() {
    // Save non-sensitive config normally
    localStorage.setItem('glimmer_api_config', JSON.stringify({
      key: null,
      model: this.model,
      baseUrl: this.baseUrl
    }));
    // Save API key securely
    if (this.key) {
      SecureStorage.setKey(this.key);
    }
  },
  
  isConfigured() {
    return !!this.key && this.key.length > 10;
  }
};

apiConfig.load();

// ====== Quote Generator ======
const quoteGenerator = {
  categories: [
    { name: '哲学', category: 'philosophy', badge: '哲思之光' },
    { name: '心理学', category: 'psychology', badge: '心光' },
    { name: '反常识', category: 'counterintuitive', badge: '逆光' },
    { name: '励志', category: 'literature', badge: '晨曦之光' }
  ],
  
  buildPrompt(category) {
    return `请生成一条打动人心的语录，要求：
- 类别: ${category.name}
- 中文正文 20-50 字
- 英文翻译准确流畅
- 来源必须是真实存在的书籍/电影/演讲/名人名言
- 背景说明 1-2 句话
- 标签格式: #关键词
- 必须且仅返回 JSON 格式，不要任何额外文字:
{"zh":"", "en":"", "source":"", "author":"", "context":"", "tag":"", "category":"${category.category}", "badge":"${category.badge}"}`;
  },
  
  async generate(category) {
    if (!apiConfig.isConfigured()) {
      throw new Error('API 未配置');
    }
    
    if (!quotaManager.canGenerate()) {
      throw new Error('今日额度已用尽');
    }
    
    const cat = category || this.categories[Math.floor(Math.random() * this.categories.length)];
    const prompt = this.buildPrompt(cat);
    
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), QUOTE_CONSTANTS.API_TIMEOUT_MS);
    
    try {
      const response = await fetch(apiConfig.baseUrl + '/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiConfig.key}`
        },
        body: JSON.stringify({
          model: apiConfig.model,
          messages: [
            { role: 'system', content: '你是一个语录生成专家，擅长创作启发人心、打动人心的内容。' },
            { role: 'user', content: prompt }
          ],
          temperature: 0.8,
          max_tokens: 500
        }),
        signal: controller.signal
      });
      
      clearTimeout(timeout);
      
      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || `API 错误: ${response.status}`);
      }
      
      const data = await response.json();
      const content = data.choices[0].message.content;
      
      // Parse JSON from response
      let quote;
      try {
        // Try to extract JSON from response (handles cases where LLM adds extra text)
        const jsonMatch = content.match(/\{[\s\S]*\}/);
        if (jsonMatch) {
          quote = JSON.parse(jsonMatch[0]);
        } else {
          throw new Error('无法解析 JSON');
        }
      } catch(e) {
        throw new Error(`返回格式错误: ${e.message}`);
      }
      
      // Validate required fields
      const required = ['zh', 'en', 'source', 'author', 'tag'];
      for (const field of required) {
        if (!quote[field]) {
          throw new Error(`缺少字段: ${field}`);
        }
      }
      
      // Ensure category and badge are set (LLM may not return them)
      if (!quote.category) {
        quote.category = cat.category;
      }
      if (!quote.badge) {
        quote.badge = cat.badge;
      }
      
      // Set additional fields
      quote.id = 'llm-' + Date.now();
      quote.generatedAt = Date.now();
      quote.isLLM = true;
      
      // Record quota usage
      quotaManager.record();
      
      return quote;
      
    } catch(e) {
      clearTimeout(timeout);
      if (e.name === 'AbortError') {
        throw new Error('请求超时');
      }
      throw e;
    }
  },
  
  async batchGenerate(count) {
    const results = [];
    for (let i = 0; i < count; i++) {
      try {
        const quote = await this.generate();
        results.push(quote);
        // Add small delay between requests
        await new Promise(r => setTimeout(r, QUOTE_CONSTANTS.BATCH_GENERATE_DELAY_MS));
      } catch(e) {
        console.warn('批量生成失败:', e.message);
      }
    }
    return results;
  }
};

// Quota Manager
const quotaManager = {
  key: 'glimmer_quota',
  
  get() {
    try {
      const raw = localStorage.getItem(this.key);
      if (raw) {
        const data = JSON.parse(raw);
        const today = new Date().toISOString().slice(0, 10);
        if (data.date === today) return data;
      }
    } catch(e) {}
    return { date: new Date().toISOString().slice(0, 10), used: 0, limit: QUOTE_CONSTANTS.DAILY_QUOTA_LIMIT };
  },
  
  record() {
    const data = this.get();
    data.used++;
    localStorage.setItem(this.key, JSON.stringify(data));
    return data;
  },
  
  canGenerate() {
    return this.get().used < QUOTE_CONSTANTS.DAILY_QUOTA_LIMIT;
  },
  
  getRemaining() {
    return Math.max(0, QUOTE_CONSTANTS.DAILY_QUOTA_LIMIT - this.get().used);
  }
};

// Settings Panel
const settingsPanel = {
  overlay: document.getElementById('settingsOverlay'),
  panel: document.getElementById('settingsPanel'),
  apiKeyInput: document.getElementById('apiKeyInput'),
  modelSelect: document.getElementById('modelSelect'),
  apiUrlInput: document.getElementById('apiUrlInput'),
  statusEl: document.getElementById('apiStatus'),
  quotaDisplay: document.getElementById('quotaDisplay'),
  
  show() {

    this.modelSelect.value = apiConfig.model;
    this.apiUrlInput.value = apiConfig.baseUrl;
    this.quotaDisplay.textContent = `${quotaManager.get().used} / ${QUOTE_CONSTANTS.DAILY_QUOTA_LIMIT}`;
    this.statusEl.style.display = 'none';
    this.overlay.classList.add('show');
    this.panel.classList.add('show');

  showStatus(type, msg) {

// Settings Events

document.getElementById('settingsSave').addEventListener('click', async () => {
  const key = settingsPanel.apiKeyInput.value.trim();
  const model = settingsPanel.modelSelect.value;
  const baseUrl = settingsPanel.apiUrlInput.value.trim();
  
  if (!key || key.length < 10) {
    settingsPanel.showStatus('error', '请输入有效的 API Key');
    return;
  }
  
  const realKey = key === '••••••••' ? apiConfig.key : key;
  
  settingsPanel.showStatus('checking', '正在验证 API Key...');
  
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), QUOTE_CONSTANTS.API_TIMEOUT_MS);
  
  try {
    const response = await fetch(baseUrl + '/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${realKey}`
      },
      body: JSON.stringify({
        model: model,
        messages: [{ role: 'user', content: '你好' }],
        max_tokens: 10
      }),
      signal: controller.signal
    });
    
    clearTimeout(timeout);
    
    if (response.ok) {
      apiConfig.key = realKey;
      apiConfig.model = model;
      apiConfig.baseUrl = baseUrl;
      apiConfig.save();
      settingsPanel.showStatus('success', '✓ API Key 验证成功，已保存');
      settingsPanel.quotaDisplay.textContent = `${quotaManager.get().used} / ${QUOTE_CONSTANTS.DAILY_QUOTA_LIMIT}`;
      localStorage.setItem('glimmer_api_setup_done', '1');
      setTimeout(() => settingsPanel.hide(), 1000);
    } else {
      const err = await response.json();
      settingsPanel.showStatus('error', `验证失败: ${err.error?.message || response.statusText}`);
    }
  } catch(e) {
    clearTimeout(timeout);
    if (e.name === 'AbortError') {
      settingsPanel.showStatus('error', '验证超时，请检查网络');
    } else {
      settingsPanel.showStatus('error', `连接失败: ${e.message}`);
    }
  }
});

// Swipe
const card = document.getElementById('quoteCard');

card.addEventListener('touchstart', e => {
  if (e.target.closest('button') || e.target.closest('input')) return;
  isDragging = true;
  startY = e.touches[0].clientY;
  card.style.transition = 'none';
}, { passive: true });

card.addEventListener('touchmove', e => {
  if (!isDragging) return;
  const diff = e.touches[0].clientY - startY;
  const move = Math.max(-60, Math.min(60, diff));
  card.style.transform = `translateY(${move}px)`;
  card.style.opacity = 1 - Math.abs(move) / 120;
}, { passive: true });

card.addEventListener('touchend', async e => {
  if (!isDragging) return;
  isDragging = false;
  card.style.transition = '';
  card.style.transform = '';
  card.style.opacity = '';
  const diff = startY - e.changedTouches[0].clientY;
  if (Math.abs(diff) > 40) {
    if (diff > 0) await nextQuote();
    else prevQuote();
  }
});

// Mouse wheel support for desktop
let wheelLock = false;
document.getElementById('main-content').addEventListener('wheel', async e => {
  if (wheelLock) return;
  const page = document.querySelector('.page.active');
  if (page && page.id !== 'pageRecommend') return;
  if (e.deltaY > 30) {
    wheelLock = true;
    await nextQuote();
    setTimeout(() => { wheelLock = false; }, 600);
  } else if (e.deltaY < -30) {
    wheelLock = true;
    prevQuote();
    setTimeout(() => { wheelLock = false; }, 600);
  }
}, { passive: true });
